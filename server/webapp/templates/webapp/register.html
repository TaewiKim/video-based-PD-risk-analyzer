<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Gait Biomarker Platform</title>
    <style>
        :root {
            --bg: #eef4f8;
            --surface: #ffffff;
            --line: #d6e2ea;
            --text: #163042;
            --text-soft: #587081;
            --primary: #1f6fb2;
            --primary-strong: #15558b;
            --danger-bg: #fff2f1;
            --danger-line: #f1c1bb;
            --danger-text: #a53b36;
            --success-bg: #eefaf4;
            --success-line: #b9e4cb;
            --success-text: #1b6d47;
            --shadow: 0 20px 44px rgba(22, 48, 66, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans CJK KR", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(31, 111, 178, 0.10), transparent 32%),
                linear-gradient(180deg, #f9fcfe 0%, var(--bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .panel {
            width: min(100%, 460px);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 30px;
        }
        h1 { margin: 0 0 8px; font-size: 1.9rem; }
        h1 span { color: var(--primary); }
        p { margin: 0 0 22px; color: var(--text-soft); line-height: 1.5; }
        label { display: block; margin-bottom: 8px; font-size: 0.92rem; color: var(--text-soft); }
        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font: inherit;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        }
        .notice { margin-bottom: 16px; padding: 11px 12px; border-radius: 10px; font-size: 0.9rem; }
        .error { border: 1px solid var(--danger-line); background: var(--danger-bg); color: var(--danger-text); }
        .success { border: 1px solid var(--success-line); background: var(--success-bg); color: var(--success-text); }
        .meta { margin-top: 16px; font-size: 0.84rem; color: var(--text-soft); }
        .meta a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <form class="panel" method="post">
        {% csrf_token %}
        <h1><span>PD</span> Create Account</h1>
        <p>Create an account and verify your email before using uploads and analysis tools.</p>
        {% if error %}<div class="notice error">{{ error }}</div>{% endif %}
        {% if message %}<div class="notice success">{{ message }}</div>{% endif %}
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required>
        <label for="password_confirm">Confirm Password</label>
        <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required>
        <button type="submit">Create Account</button>
        <div class="meta">Already registered? <a href="{% url 'login' %}">Sign in</a> · Need another link? <a href="{% url 'resend_verification' %}">Resend verification</a></div>
    </form>
</body>
</html>
